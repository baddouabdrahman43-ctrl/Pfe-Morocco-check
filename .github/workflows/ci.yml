name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back-end/package-lock.json

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Install backend dependencies
        working-directory: back-end
        run: npm ci

      - name: Prepare backend environment
        working-directory: back-end
        run: |
          cat <<'EOF' > .env
          PORT=5001
          NODE_ENV=development
          DB_HOST=127.0.0.1
          DB_USER=root
          DB_PASSWORD=root
          DB_NAME=moroccocheck
          DB_PORT=3306
          DB_EXIT_ON_FAILURE=true
          JWT_SECRET=test-secret
          JWT_EXPIRES_IN=7d
          REFRESH_TOKEN_TTL_DAYS=30
          CORS_ALLOWED_ORIGINS=http://127.0.0.1:5173,http://localhost:5173
          CORS_ALLOW_NO_ORIGIN=true
          RATE_LIMIT_ENABLED=false
          EOF

          cat <<'EOF' > .env.test
          PORT=5001
          NODE_ENV=test
          DB_HOST=127.0.0.1
          DB_USER=root
          DB_PASSWORD=root
          DB_NAME=moroccocheck_test
          DB_PORT=3306
          DB_EXIT_ON_FAILURE=true
          JWT_SECRET=test-secret
          JWT_EXPIRES_IN=7d
          REFRESH_TOKEN_TTL_DAYS=30
          CORS_ALLOWED_ORIGINS=http://127.0.0.1:5173,http://localhost:5173
          CORS_ALLOW_NO_ORIGIN=true
          RATE_LIMIT_ENABLED=false
          EOF

      - name: Initialize backend databases
        run: |
          mysql --protocol=tcp -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS moroccocheck CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql --protocol=tcp -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS moroccocheck_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql --protocol=tcp -h 127.0.0.1 -uroot -proot moroccocheck < back-end/sql/install_database.sql
          mysql --protocol=tcp -h 127.0.0.1 -uroot -proot moroccocheck_test < back-end/sql/install_database.sql

      - name: Run backend migrations
        working-directory: back-end
        run: npm run migrate

      - name: Run backend tests
        working-directory: back-end
        run: npm test

  admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install admin web dependencies
        working-directory: admin-web
        run: npm ci

      - name: Build admin web
        working-directory: admin-web
        env:
          VITE_APP_ENV: staging
          VITE_API_BASE_URL: https://api-staging.example.com/api
        run: npm run build:staging

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: front-end
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: front-end
        run: flutter analyze

      - name: Build Flutter Android staging APK
        working-directory: front-end
        run: >
          flutter build apk --debug --flavor staging
          --dart-define=APP_ENV=staging
          --dart-define=API_BASE_URL=https://api-staging.example.com/api
